<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – Kana Kombucha</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <!-- Login Gate -->
    <div class="login-gate" id="loginGate">
        <div class="login-card">
            <h1>Kana <span>Admin</span></h1>
            <p>Enter password to continue</p>
            <form id="loginForm">
                <input type="password" id="passwordInput" placeholder="Password" autocomplete="current-password" required>
                <button type="submit">Log In</button>
                <p class="login-error" id="loginError"></p>
            </form>
        </div>
    </div>

    <!-- Admin Panel -->
    <div class="admin-panel" id="adminPanel" style="display:none;">
        <header class="admin-header">
            <div class="admin-header-inner">
                <a href="index.html" class="admin-logo">Kana <span>Admin</span></a>
                <div class="admin-header-actions">
                    <button class="btn-add" id="btnAddFlavour">+ Add Flavour</button>
                    <button class="btn-logout" id="btnLogout">Log Out</button>
                </div>
            </div>
        </header>

        <main class="admin-main">
            <div class="admin-container">
                <h2>Flavours <span class="count" id="flavourCount">0</span></h2>
                <div class="flavour-list" id="flavourList">
                    <!-- Rendered dynamically -->
                </div>
            </div>
        </main>

        <!-- Modal for Add/Edit -->
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal" id="flavourModal">
                <div class="modal-header">
                    <h3 id="modalTitle">Add Flavour</h3>
                    <button class="modal-close" id="modalClose">&times;</button>
                </div>
                <form id="flavourForm">
                    <input type="hidden" id="flavourId">

                    <div class="form-row">
                        <div class="form-group">
                            <label for="nameEn">Name (EN)</label>
                            <input type="text" id="nameEn" required placeholder="e.g. Ginger Lemon">
                        </div>
                        <div class="form-group">
                            <label for="nameLt">Name (LT)</label>
                            <input type="text" id="nameLt" required placeholder="e.g. Imbieras ir citrina">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="descEn">Description (EN)</label>
                            <textarea id="descEn" rows="3" required placeholder="Flavour description in English"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="descLt">Description (LT)</label>
                            <textarea id="descLt" rows="3" required placeholder="Skonio aprašymas lietuviškai"></textarea>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="badgeEn">Badge (EN)</label>
                            <input type="text" id="badgeEn" placeholder="e.g. Classic, New, Popular">
                        </div>
                        <div class="form-group">
                            <label for="badgeLt">Badge (LT)</label>
                            <input type="text" id="badgeLt" placeholder="e.g. Klasikinis, Naujiena">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="accentColor">Accent Colour</label>
                            <div class="color-input-wrap">
                                <input type="color" id="accentColor" value="#e8a87c">
                                <span id="colorHex">#e8a87c</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="imageInput">Image</label>
                            <input type="file" id="imageInput" accept="image/*">
                            <p class="form-hint">Max 2 MB. Will be stored locally.</p>
                        </div>
                    </div>

                    <div class="image-preview-wrap" id="imagePreviewWrap" style="display:none;">
                        <img id="imagePreview" alt="Preview">
                        <button type="button" class="btn-remove-image" id="btnRemoveImage">Remove</button>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-cancel" id="btnCancel">Cancel</button>
                        <button type="submit" class="btn-save">Save Flavour</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
